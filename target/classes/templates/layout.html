<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">

<head>
    <meta charset="UTF-8">
    <title>Car Management</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --light: #ecf0f1;
            --danger: #e74c3c;
            --sidebar-width: 250px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            background-color: #f4f7f6;
        }

        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background-color: var(--primary);
            color: white;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.5rem;
            border-bottom: 1px solid var(--secondary);
            text-align: center;
        }

        .sidebar-menu {
            flex: 1;
            padding: 20px 0;
        }

        .sidebar-menu a {
            display: block;
            padding: 15px 25px;
            color: #bdc3c7;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar-menu a:hover {
            background-color: var(--secondary);
            color: white;
            border-left: 4px solid var(--accent);
        }

        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f8f9fa;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-header">CarApp</div>
        <div class="sidebar-menu">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/cars}">Show All Car Items</a>
            <a th:href="@{/create}">Create New Car</a>
            <a th:href="@{/rent}" style="border-top: 1px solid #34495e; margin-top: 10px; padding-top: 15px;">Rent / Buy a Vehicle</a>
            <a th:href="@{/history}">Operations History</a>
        </div>
        <div style="padding: 15px 25px; border-top: 1px solid #34495e;">
            <form th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" style="background:none; border:none; color:#e74c3c; cursor:pointer; font-size:1rem; padding:0;">Logout</button>
            </form>
        </div>
    </div>

    <div class="main-content">
        <div th:replace="${content}"></div>
    </div>
</body>

</html>
