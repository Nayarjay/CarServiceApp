<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Bank Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', serif;
        }

        .navbar {
            background-color: #2c3e50;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Bank Credit Service</a>
            <span class="navbar-text">Port 8081</span>
        </div>
    </nav>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <div class="card p-4 mb-4">
                    <h3>User Balances</h3>
                    <table class="table table-striped mt-3">
                        <thead class="table-dark">
                            <tr>
                                <th>User ID</th>
                                <th>Current Balance</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="entry : ${balances}">
                                <td th:text="${entry.key}">quentin</td>
                                <td class="fw-bold text-primary"
                                    th:text="${#numbers.formatDecimal(entry.value, 1, 2) + ' €'}">10000.00 €</td>
                                <td><span class="badge bg-success">Active</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="col-md-12">
                <div class="card p-4">
                    <h3>Bank Status</h3>
                    <p>The bank is currently processing credit requests via RabbitMQ.</p>
                    <ul class="list-group">
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            RabbitMQ Connection
                            <span class="badge bg-success rounded-pill">Active</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Fraud Detection System
                            <span class="badge bg-warning text-dark rounded-pill">Enabled</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
